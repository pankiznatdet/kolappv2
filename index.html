  var ar=function(k){return st.ns===k?(st.nd==="asc"?" ↑":" ↓"):""};
  var t=D.getElementById("ntbl");
  t.innerHTML='<thead><tr><th>Gıda</th>'+cols.map(function(c){return '<th class="'+(st.ns===c.k?"sa":"")+'" data-nsort="'+c.k+'">'+c.l+ar(c.k)+'</th>'}).join('')+'</tr></thead><tbody>'+
    list.map(function(f){return '<tr data-fid="'+f.id+'"><td><span class="dt" style="background:'+rc(f.r)+'"></span>'+f.n+'</td>'+cols.map(function(c){return '<td class="'+(c.k==="ch"&&f.ch>100?"ch":"")+(c.k===st.ns?" sa":"")+'">'+f[c.k]+'</td>'}).join('')+'</tr>'}).join('')+'</tbody>';
}

function bind(){
  D.getElementById("app").addEventListener("click",function(e){
    var t=e.target.closest("[data-go]");
    if(t){st.pg=t.dataset.go;st.fc="Tümü";st.ac="Tümü";render();window.scrollTo(0,0);return;}

    var fc=e.target.closest("[data-fid]");
    if(fc){openModal(parseInt(fc.dataset.fid));return;}

    var fp=e.target.closest("[data-fcat]");
    if(fp){st.fc=fp.dataset.fcat;Q(".pills button",D.getElementById("pg-foods")).forEach(function(b){b.classList.toggle("on",b.dataset.fcat===st.fc)});updateList("flist","fs",false,st.fc);return;}

    var ap=e.target.closest("[data-acat]");
    if(ap){st.ac=ap.dataset.acat;Q(".pills button",D.getElementById("pg-avoid")).forEach(function(b){b.classList.toggle("on",b.dataset.acat===st.ac)});updateList("alist","as",true,st.ac);return;}

    if(e.target.id==="gen-btn"||e.target.id==="regen-btn"){D.getElementById("meal-out").innerHTML=genMealHTML();return;}

    var ns=e.target.closest("[data-nsort]");
    if(ns){var k=ns.dataset.nsort;if(st.ns===k)st.nd=st.nd==="asc"?"desc":"asc";else{st.ns=k;st.nd="desc";}updateNutr();return;}

    if(e.target.id==="modal-overlay"){closeModal();return;}

    var clr=e.target.closest(".cb");
    if(clr){var inp=clr.previousElementSibling;if(inp){inp.value="";clr.classList.remove("v");inp.dispatchEvent(new Event("input"));}return;}
  });

  var fs=D.getElementById("fs");
  if(fs) fs.addEventListener("input",function(){updateList("flist","fs",false,st.fc)});
  var as=D.getElementById("as");
  if(as) as.addEventListener("input",function(){updateList("alist","as",true,st.ac)});
  var nss=D.getElementById("ns");
  if(nss) nss.addEventListener("input",function(){updateNutr()});
}

render();
</script>
</body>
</html>
